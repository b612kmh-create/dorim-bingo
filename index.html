<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 도림고 1학년 현장체험학습 미션 빙고</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
            overscroll-behavior: none;
            overflow-x: hidden;
        }
        .bingo-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            background-color: #1e293b;
            padding: 6px;
            border-radius: 16px;
        }
        .bingo-cell {
            aspect-ratio: 1 / 1;
            background: #ffffff;
            color: #1e293b;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 4px;
            font-size: 0.65rem;
            font-weight: 700;
            line-height: 1.2;
            word-break: keep-all;
            border-radius: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .bingo-cell.status-success {
            background: #4f46e5;
            color: #ffffff;
            transform: scale(0.96);
        }
        .bingo-cell.status-error {
            background: #ef4444;
            color: #ffffff;
            animation: shake 0.4s ease-in-out;
        }
        .location-badge {
            font-size: 0.45rem;
            color: #6366f1;
            margin-bottom: 2px;
            font-weight: 800;
            background: #f0f1ff;
            padding: 1px 4px;
            border-radius: 4px;
        }
        .status-success .location-badge, .status-error .location-badge {
            background: rgba(255,255,255,0.2);
            color: #ffffff;
        }
        .answer-preview {
            margin-top: 3px;
            font-size: 0.5rem;
            opacity: 0.8;
            font-weight: 400;
            max-width: 90%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #modal {
            transition: opacity 0.2s ease, transform 0.2s ease;
            display: none;
        }
        #modal.active {
            display: flex;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="entry-layer" class="w-full max-w-md glass-card p-8 rounded-[2rem] shadow-2xl z-20">
        <div class="text-center mb-8">
            <span class="inline-block px-3 py-1 bg-indigo-500/20 text-indigo-400 text-[10px] font-bold rounded-full mb-3 uppercase tracking-widest">Incheon Field Trip 2026</span>
            <h1 class="text-2xl font-extrabold text-white mb-2 leading-tight">2026 도림고등학교<br>1학년 현장체험학습</h1>
            <p class="text-slate-400 text-sm">미션을 완료하고 빙고판을 캡처하세요</p>
        </div>
        
        <div class="space-y-4">
            <div>
                <label class="block text-[10px] font-bold text-slate-500 mb-1 ml-1 uppercase tracking-wider">Student ID</label>
                <input type="text" id="input-id" placeholder="예: 10101" 
                    class="w-full bg-slate-800/50 border-2 border-slate-700 rounded-2xl px-5 py-4 focus:border-indigo-500 outline-none transition-all text-white placeholder:text-slate-600">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-500 mb-1 ml-1 uppercase tracking-wider">Full Name</label>
                <input type="text" id="input-name" placeholder="성함을 입력하세요" 
                    class="w-full bg-slate-800/50 border-2 border-slate-700 rounded-2xl px-5 py-4 focus:border-indigo-500 outline-none transition-all text-white placeholder:text-slate-600">
            </div>
            <button onclick="initBingo()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-5 rounded-2xl shadow-xl shadow-indigo-500/20 transition-all transform active:scale-95">
                개인 미션판 생성
            </button>
        </div>
    </div>

    <div id="bingo-layer" class="hidden w-full max-w-md">
        <div class="bg-white rounded-[2.5rem] p-6 shadow-2xl text-slate-900">
            <div class="flex justify-between items-center mb-6 px-1">
                <div>
                    <h2 class="text-xl font-black text-indigo-950 tracking-tighter">DORIM MISSION</h2>
                    <div id="user-info" class="text-[10px] font-bold text-indigo-500 tracking-widest mt-0.5 uppercase">
                        <!-- ID & NAME -->
                    </div>
                </div>
                <div class="bg-indigo-50 px-4 py-2 rounded-2xl border border-indigo-100">
                    <span id="score" class="text-sm font-black text-indigo-600 italic">0 / 16</span>
                </div>
            </div>

            <div id="grid-container" class="bingo-grid">
                <!-- Cells will be generated here -->
            </div>

            <div class="mt-6 space-y-4">
                <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <p class="text-[11px] text-slate-500 leading-relaxed text-center font-semibold">
                        📍 지정된 3곳의 장소에서 정답을 찾아 입력하세요.<br>
                        모든 칸을 <span class="text-indigo-600">성공(파란색)</span>으로 만들고 캡처하세요!
                    </p>
                </div>
                <div class="flex justify-between items-center text-[9px] text-slate-300 font-bold px-1 uppercase tracking-widest">
                    <div id="ticket-id">DORIM-2026-X</div>
                    <button onclick="location.reload()" class="text-indigo-300 hover:text-indigo-500 underline">초기화</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 z-50 items-center justify-center p-6 bg-slate-950/80 backdrop-blur-sm">
        <div class="bg-white w-full max-w-xs rounded-[2rem] p-8 shadow-2xl transform transition-all">
            <div class="mb-6 text-center">
                <div id="modal-loc" class="text-[10px] font-black text-indigo-500 uppercase tracking-[0.2em] bg-indigo-50 py-1.5 px-3 rounded-full inline-block mb-3">LOCATION</div>
                <p id="modal-q" class="text-lg font-bold text-slate-800 leading-tight">질문 데이터 로딩중...</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="modal-input" placeholder="정답을 입력하세요" 
                    class="w-full bg-slate-100 border-2 border-slate-100 rounded-2xl px-4 py-4 focus:border-indigo-500 outline-none text-slate-900 font-bold text-center transition-all">
                <div class="flex gap-2">
                    <button onclick="closeModal()" class="flex-1 bg-slate-100 text-slate-500 font-bold py-4 rounded-2xl hover:bg-slate-200 transition-all">취소</button>
                    <button onclick="checkAnswer()" class="flex-1 bg-indigo-600 text-white font-bold py-4 rounded-2xl hover:bg-indigo-500 shadow-lg shadow-indigo-200 transition-all">제출</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const LOCATIONS = ["인천도시역사박물관", "국립세계문자박물관", "G타워 IFEZ 홍보관"];
        
        const quizMaster = [
            { l: LOCATIONS[0], q: "인천의 옛 이름 중 '거친 들판'이라는 뜻은?", a: "미추홀" },
            { l: LOCATIONS[0], q: "개항기 인천에 설치된 최초의 서구식 공원은?", a: "자유공원" },
            { l: LOCATIONS[0], q: "1883년 인천이 외국에 문을 연 사건은?", a: "개항" },
            { l: LOCATIONS[0], q: "인천항의 조수간만 차를 극복하는 장치 이름은?", a: "갑문" },
            { l: LOCATIONS[0], q: "근대 인천에서 외교관들이 묵던 호텔 이름은?", a: "대불호텔" },
            { l: LOCATIONS[1], q: "인류 최초의 문자, 점토판에 새겨진 문자는?", a: "쐐기문자" },
            { l: LOCATIONS[1], q: "이집트에서 종이 대신 사용한 식물은?", a: "파피루스" },
            { l: LOCATIONS[1], q: "세종대왕이 창제한 우리나라 고유 문자는?", a: "훈민정음" },
            { l: LOCATIONS[1], q: "한글 창제 원리가 기록된 국보급 책은?", a: "해례본" },
            { l: LOCATIONS[1], q: "로제타석 발견으로 해독된 고대 문자는?", a: "이집트문자" },
            { l: LOCATIONS[2], q: "인천경제자유구역의 약자는?", a: "IFEZ" },
            { l: LOCATIONS[2], q: "송도, 영종 외 나머지 한 구역은?", a: "청라" },
            { l: LOCATIONS[2], q: "G타워 전망대에서 보이는 인공 수로의 이름은?", a: "센트럴파크" },
            { l: LOCATIONS[2], q: "바다를 메워 만든 도시를 뜻하는 용어는?", a: "간척지" },
            { l: LOCATIONS[2], q: "미래 도시 기술이 집약된 도시 모델은?", a: "스마트시티" }
        ];

        // 부족한 문항(16개 미만일 경우 대비)을 장소별로 자동 생성
        while (quizMaster.length < 40) {
            const loc = LOCATIONS[quizMaster.length % 3];
            quizMaster.push({
                l: loc,
                q: `${loc}에서 찾은 가장 인상 깊은 전시물의 이름은?`,
                a: "미션" // '미션'이라고 입력하면 정답 처리되거나, 자유 정답 형태
            });
        }

        let currentData = [];
        let selectedIndex = null;
        let correctCount = 0;

        function initBingo() {
            const id = document.getElementById('input-id').value.trim();
            const name = document.getElementById('input-name').value.trim();

            if (!id || !name) {
                return;
            }

            document.getElementById('entry-layer').classList.add('hidden');
            document.getElementById('bingo-layer').classList.remove('hidden');
            document.getElementById('user-info').innerText = `${id} | ${name}`;
            document.getElementById('ticket-id').innerText = `DORIM-${id}-${Math.random().toString(36).substr(2,4).toUpperCase()}`;

            // 16개 무작위 선택 (오류 방지를 위해 셔플 로직 강화)
            currentData = [...quizMaster]
                .sort(() => 0.5 - Math.random())
                .slice(0, 16)
                .map(item => ({ ...item, state: 'none', user: '' }));

            renderGrid();
        }

        function renderGrid() {
            const container = document.getElementById('grid-container');
            container.innerHTML = '';

            currentData.forEach((item, i) => {
                const cell = document.createElement('div');
                cell.className = `bingo-cell status-${item.state}`;
                
                const loc = document.createElement('div');
                loc.className = 'location-badge';
                loc.innerText = item.l.split(' ')[0]; // 장소명 축약 표시
                
                const q = document.createElement('div');
                q.innerText = item.q.length > 20 ? item.q.substring(0, 18) + '..' : item.q;

                cell.appendChild(loc);
                cell.appendChild(q);

                if (item.user) {
                    const ans = document.createElement('div');
                    ans.className = 'answer-preview';
                    ans.innerText = `${item.state === 'success' ? '정답' : '오답'}: ${item.user}`;
                    cell.appendChild(ans);
                }

                cell.onclick = () => openModal(i);
                container.appendChild(cell);
            });
        }

        function openModal(index) {
            if (currentData[index].state === 'success') return;
            
            selectedIndex = index;
            const item = currentData[index];
            
            document.getElementById('modal-loc').innerText = item.l;
            document.getElementById('modal-q').innerText = item.q;
            document.getElementById('modal-input').value = item.user;
            document.getElementById('modal').classList.add('active');
            
            setTimeout(() => document.getElementById('modal-input').focus(), 100);
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            selectedIndex = null;
        }

        function checkAnswer() {
            if (selectedIndex === null) return;
            
            const input = document.getElementById('modal-input').value.trim();
            if (!input) return;

            const target = currentData[selectedIndex];
            target.user = input;

            // 정답 비교 로직 (공백 제거, 소문자화)
            const cleanInput = input.replace(/\s+/g, '').toLowerCase();
            const cleanAnswer = target.a.replace(/\s+/g, '').toLowerCase();

            // '미션' 퀴즈의 경우 아무 내용이나 쓰면 통과
            const isCorrect = (target.a === "미션" && input.length > 1) || (cleanInput === cleanAnswer);

            if (isCorrect) {
                if (target.state !== 'success') correctCount++;
                target.state = 'success';
            } else {
                target.state = 'error';
            }

            updateScore();
            renderGrid();
            closeModal();
        }

        function updateScore() {
            const scoreEl = document.getElementById('score');
            scoreEl.innerText = correctCount === 16 ? "ALL CLEAR! 🏆" : `${correctCount} / 16`;
            if (correctCount === 16) scoreEl.classList.add('animate-bounce');
        }

        // 엔터키 지원
        document.getElementById('modal-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAnswer();
        });
    </script>
</body>
</html>

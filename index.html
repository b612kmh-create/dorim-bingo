
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 도림고 1학년 현장체험학습</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* 스크롤 없이 한 화면에 맞추기 위한 컨테이너 */
        .app-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 12px;
        }

        .bingo-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            background-color: #1e293b;
            padding: 4px;
            border-radius: 12px;
            flex: 1; /* 남은 공간을 그리드가 차지 */
            max-height: 70vh; /* 그리드가 너무 커지지 않도록 제한 */
        }

        .bingo-cell {
            background: #ffffff;
            color: #1e293b;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 4px;
            font-size: 0.6rem;
            font-weight: 700;
            line-height: 1.1;
            word-break: keep-all;
            border-radius: 8px;
            transition: all 0.2s ease;
            cursor: pointer;
            position: relative;
            box-shadow: inset 0 -2px 0 rgba(0,0,0,0.05);
        }

        .bingo-cell.status-success {
            background: #4f46e5;
            color: #ffffff;
            transform: scale(0.95);
        }

        .bingo-cell.status-error {
            background: #ef4444;
            color: #ffffff;
            animation: shake 0.3s ease-in-out;
        }

        .location-badge {
            font-size: 0.4rem;
            color: #6366f1;
            margin-bottom: 2px;
            font-weight: 800;
            background: #f0f1ff;
            padding: 1px 3px;
            border-radius: 3px;
            white-space: nowrap;
        }

        .status-success .location-badge, .status-error .location-badge {
            background: rgba(255,255,255,0.2);
            color: #ffffff;
        }

        .answer-preview {
            margin-top: 2px;
            font-size: 0.45rem;
            opacity: 0.8;
            font-weight: 400;
            max-width: 90%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            border-top: 1px solid rgba(0,0,0,0.05);
            padding-top: 1px;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-3px); }
            75% { transform: translateX(3px); }
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #modal {
            display: none;
            backdrop-filter: blur(4px);
        }
        #modal.active {
            display: flex;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- 입장 레이어 -->
        <div id="entry-layer" class="w-full h-full flex flex-col justify-center px-4">
            <div class="glass-card p-8 rounded-[2rem] shadow-2xl">
                <div class="text-center mb-6">
                    <span class="inline-block px-3 py-1 bg-indigo-500/20 text-indigo-400 text-[10px] font-bold rounded-full mb-2 uppercase tracking-widest">DORIM HIGH SCHOOL</span>
                    <h1 class="text-xl font-extrabold text-white mb-1 leading-tight">2026학년도 도림고등학교<br>1학년 현장체험학습</h1>
                    <p class="text-slate-400 text-xs">학번과 이름을 입력하고 시작하세요</p>
                </div>
                
                <div class="space-y-3">
                    <input type="text" id="input-id" placeholder="학번 (예: 10101)" 
                        class="w-full bg-slate-800 border-2 border-slate-700 rounded-xl px-5 py-3 focus:border-indigo-500 outline-none text-white">
                    <input type="text" id="input-name" placeholder="이름" 
                        class="w-full bg-slate-800 border-2 border-slate-700 rounded-xl px-5 py-3 focus:border-indigo-500 outline-none text-white">
                    <button onclick="initBingo()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95">
                        미션 시작하기
                    </button>
                </div>
            </div>
        </div>

        <!-- 빙고 레이어 -->
        <div id="bingo-layer" class="hidden w-full h-full flex flex-col">
            <!-- 헤더 영역 (최소화) -->
            <div class="flex justify-between items-end mb-3 px-1 mt-2">
                <div>
                    <h2 class="text-sm font-black text-white tracking-tight">2026 도림고 미션</h2>
                    <div id="user-info" class="text-[10px] font-bold text-indigo-400">
                        <!-- ID & NAME -->
                    </div>
                </div>
                <div class="bg-indigo-600 px-3 py-1 rounded-lg">
                    <span id="score" class="text-xs font-black text-white">0 / 16</span>
                </div>
            </div>

            <!-- 격자 영역 (자동 크기 조절) -->
            <div id="grid-container" class="bingo-grid">
                <!-- Cells will be generated here -->
            </div>

            <!-- 하단 안내 (최소화) -->
            <div class="mt-3 mb-2 px-1">
                <div class="p-2 bg-slate-800/50 rounded-xl border border-slate-700 mb-2">
                    <p class="text-[9px] text-slate-400 leading-tight text-center">
                        📍 각 장소의 미션을 해결해 빙고를 완성하세요!<br>
                        모두 완료 후 <span class="text-indigo-400 font-bold">이 화면을 캡처</span>하여 제출하세요.
                    </p>
                </div>
                <div class="flex justify-between items-center text-[8px] text-slate-500 font-bold px-1">
                    <div id="ticket-id">DORIM-2026</div>
                    <button onclick="location.reload()" class="underline">초기화</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 z-50 items-center justify-center p-4 bg-slate-950/90">
        <div class="bg-white w-full max-w-xs rounded-3xl p-6 shadow-2xl overflow-hidden">
            <div class="mb-4 text-center">
                <div id="modal-loc" class="text-[10px] font-black text-indigo-500 uppercase tracking-widest bg-indigo-50 py-1 px-3 rounded-full inline-block mb-2">LOCATION</div>
                <p id="modal-q" class="text-base font-bold text-slate-800 leading-snug">질문 로딩중...</p>
            </div>
            <div class="space-y-3">
                <input type="text" id="modal-input" placeholder="정답을 입력하세요" 
                    class="w-full bg-slate-100 border-2 border-slate-100 rounded-xl px-4 py-3 focus:border-indigo-500 outline-none text-slate-900 font-bold text-center">
                <div class="flex gap-2">
                    <button onclick="closeModal()" class="flex-1 bg-slate-100 text-slate-500 font-bold py-3 rounded-xl">취소</button>
                    <button onclick="checkAnswer()" class="flex-1 bg-indigo-600 text-white font-bold py-3 rounded-xl shadow-md">제출</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const LOCATIONS = ["인천도시역사박물관", "국립세계문자박물관", "G타워 IFEZ 홍보관"];
        
        // 고유 질문 데이터 (중복 방지를 위한 ID 부여)
        const baseQuizzes = [
            { id: 1, l: LOCATIONS[0], q: "인천의 옛 이름 중 '거친 들판'이라는 뜻은?", a: "미추홀" },
            { id: 2, l: LOCATIONS[0], q: "개항기 인천에 설치된 최초의 서구식 공원은?", a: "자유공원" },
            { id: 3, l: LOCATIONS[0], q: "1883년 인천이 외국에 문을 연 사건은?", a: "개항" },
            { id: 4, l: LOCATIONS[0], q: "인천항의 조수간만 차를 극복하는 장치 이름은?", a: "갑문" },
            { id: 5, l: LOCATIONS[0], q: "근대 인천에서 외교관들이 묵던 호텔 이름은?", a: "대불호텔" },
            { id: 6, l: LOCATIONS[1], q: "인류 최초의 문자, 점토판에 새겨진 문자는?", a: "쐐기문자" },
            { id: 7, l: LOCATIONS[1], q: "이집트에서 종이 대신 사용한 식물은?", a: "파피루스" },
            { id: 8, l: LOCATIONS[1], q: "세종대왕이 창제한 우리나라 고유 문자는?", a: "훈민정음" },
            { id: 9, l: LOCATIONS[1], q: "한글 창제 원리가 기록된 국보급 책은?", a: "해례본" },
            { id: 10, l: LOCATIONS[1], q: "로제타석 발견으로 해독된 고대 문자는?", a: "이집트문자" },
            { id: 11, l: LOCATIONS[2], q: "인천경제자유구역의 약자는?", a: "IFEZ" },
            { id: 12, l: LOCATIONS[2], q: "송도, 영종 외 나머지 한 구역은?", a: "청라" },
            { id: 13, l: LOCATIONS[2], q: "G타워 전망대에서 보이는 인공 수로의 이름은?", a: "센트럴파크" },
            { id: 14, l: LOCATIONS[2], q: "바다를 메워 만든 도시를 뜻하는 용어는?", a: "간척지" },
            { id: 15, l: LOCATIONS[2], q: "미래 도시 기술이 집약된 도시 모델은?", a: "스마트시티" },
            { id: 16, l: LOCATIONS[0], q: "박물관 1층 전시실에서 가장 큰 유물은?", a: "자동차" },
            { id: 17, l: LOCATIONS[1], q: "문자박물관 야외 전시장에 있는 큰 조형물은?", a: "스피커" },
            { id: 18, l: LOCATIONS[2], q: "G타워 33층 홍보관에서 보이는 대교 이름은?", a: "인천대교" }
        ];

        let currentData = [];
        let selectedIndex = null;
        let correctCount = 0;

        // 피셔-예이츠 셔플 알고리즘 (완전 무작위)
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[array[j]]] = [array[array[j]], array[i]];
            }
            return array;
        }

        function initBingo() {
            const idInput = document.getElementById('input-id');
            const nameInput = document.getElementById('input-name');
            const id = idInput.value.trim();
            const name = nameInput.value.trim();

            if (!id || !name) {
                idInput.classList.add('border-red-500');
                nameInput.classList.add('border-red-500');
                return;
            }

            document.getElementById('entry-layer').classList.add('hidden');
            document.getElementById('bingo-layer').classList.remove('hidden');
            document.getElementById('user-info').innerText = `${id} ${name}`;
            document.getElementById('ticket-id').innerText = `DORIM-${id}-${Math.random().toString(36).substr(2,3).toUpperCase()}`;

            // 중복 없이 16개 선택
            let pool = [...baseQuizzes];
            shuffle(pool);
            
            // 부족한 경우를 대비한 안전 장치 (ID를 다르게 하여 중복 인식 방지)
            while (pool.length < 16) {
                const loc = LOCATIONS[pool.length % 3];
                pool.push({
                    id: 100 + pool.length,
                    l: loc,
                    q: `${loc}에서 발견한 가장 멋진 유물 이름은?`,
                    a: "미션"
                });
            }

            currentData = pool.slice(0, 16).map(item => ({ ...item, state: 'none', user: '' }));

            renderGrid();
        }

        function renderGrid() {
            const container = document.getElementById('grid-container');
            container.innerHTML = '';

            currentData.forEach((item, i) => {
                const cell = document.createElement('div');
                cell.className = `bingo-cell status-${item.state}`;
                
                const loc = document.createElement('div');
                loc.className = 'location-badge';
                loc.innerText = item.l === LOCATIONS[0] ? "역사박물관" : 
                               item.l === LOCATIONS[1] ? "문자박물관" : "IFEZ홍보관";
                
                const q = document.createElement('div');
                // 글자 수에 따라 폰트 크기 조절
                const qText = item.q.length > 22 ? item.q.substring(0, 20) + '..' : item.q;
                q.innerText = qText;

                cell.appendChild(loc);
                cell.appendChild(q);

                if (item.user) {
                    const ans = document.createElement('div');
                    ans.className = 'answer-preview';
                    ans.innerText = item.user;
                    cell.appendChild(ans);
                }

                cell.onclick = () => openModal(i);
                container.appendChild(cell);
            });
        }

        function openModal(index) {
            if (currentData[index].state === 'success') return;
            
            selectedIndex = index;
            const item = currentData[index];
            
            document.getElementById('modal-loc').innerText = item.l;
            document.getElementById('modal-q').innerText = item.q;
            document.getElementById('modal-input').value = item.user;
            document.getElementById('modal').classList.add('active');
            
            setTimeout(() => document.getElementById('modal-input').focus(), 100);
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            selectedIndex = null;
        }

        function checkAnswer() {
            if (selectedIndex === null) return;
            
            const input = document.getElementById('modal-input').value.trim();
            if (!input) return;

            const target = currentData[selectedIndex];
            target.user = input;

            const cleanInput = input.replace(/\s+/g, '').toLowerCase();
            const cleanAnswer = target.a.replace(/\s+/g, '').toLowerCase();

            const isCorrect = (target.a === "미션" && input.length >= 2) || (cleanInput === cleanAnswer);

            if (isCorrect) {
                if (target.state !== 'success') correctCount++;
                target.state = 'success';
            } else {
                target.state = 'error';
            }

            updateScore();
            renderGrid();
            closeModal();
        }

        function updateScore() {
            const scoreEl = document.getElementById('score');
            scoreEl.innerText = correctCount === 16 ? "ALL CLEAR! 🏆" : `${correctCount} / 16`;
        }

        document.getElementById('modal-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAnswer();
        });
    </script>
</body>
</html>
